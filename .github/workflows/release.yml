name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ \
            libsqlite3-dev \
            libssl-dev \
            libcurl4-openssl-dev \
            libjsoncpp-dev \
            libjsonrpccpp-dev \
            libboost-dev

      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TEST=OFF \
            -DBUILD_CLI=OFF \
            -DBUILD_WEB=OFF \
            -DBUILD_QT=OFF
          cmake --build build -j$(nproc)

      - name: Package
        run: |
          cp bin/digiasset_core digiasset_core-linux-x64

      - uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: digiasset_core-linux-x64

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install cmake sqlite openssl@3 curl jsoncpp libjson-rpc-cpp boost

      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TEST=OFF \
            -DBUILD_CLI=OFF \
            -DBUILD_WEB=OFF \
            -DBUILD_QT=OFF \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3)
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Package
        run: cp bin/digiasset_core digiasset_core-macos-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: macos-binary
          path: digiasset_core-macos-arm64

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '2024.11.16'

      - name: Build
        uses: lukka/run-cmake@v10
        with:
          cmakeListsTxtPath: '${{ github.workspace }}/CMakeLists.txt'
          configurePreset: ''
          buildPreset: ''
          cmakeAppendedArgs: >-
            -DCMAKE_BUILD_TYPE=Release
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
            -DVCPKG_TARGET_TRIPLET=x64-windows
            -DBUILD_TEST=OFF
            -DBUILD_CLI=OFF
            -DBUILD_WEB=OFF
            -DBUILD_QT=OFF
          buildDirectory: '${{ github.workspace }}/build'

      - name: Package
        run: |
          copy build\Release\digiasset_core.exe digiasset_core-windows-x64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: digiasset_core-windows-x64.exe

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux-binary/digiasset_core-linux-x64
            artifacts/macos-binary/digiasset_core-macos-arm64
            artifacts/windows-binary/digiasset_core-windows-x64.exe
          generate_release_notes: true
