# =====================================================================
#  DigiAsset for Windows - config.cfg reference
# =====================================================================
#  - Any line starting with # is a comment (ignored).
#  - Lines must be exactly key=value  (no spaces/tabs around the =).
#  - Comments are NOT preserved if the app rewrites the file itself.
#  - Every value shown is the DEFAULT unless marked *** (must be set).
#
#  You normally do NOT hand-write this: the installer (setup-digiasset.ps1)
#  writes a working config.cfg to C:\DigiAssetWindows\config.cfg for you.
#  This file documents every setting the node actually reads, for tuning.
# =====================================================================


# --- Logging ----------------------------------------------------------
# Lowest level that gets logged. Levels: 0=DEBUG 10=INFO 20=WARNING 30=ERROR 40=CRITICAL
# logscreen = what prints in the dashboard log; logfile = what goes to the log file.
logscreen=10
logfile=20


# --- DigiByte Core RPC (how the node reaches your wallet) -------------
# *** rpcuser / rpcpassword MUST match C:\DigiByte\digibyte.conf. No @ symbol in either.
# rpcbind  = DigiByte Core's RPC address (leave 127.0.0.1 - never expose it).
# rpcport  = DigiByte Core's RPC port.
# rpctimeout = RPC timeout in ms (keep high).
rpcuser=***********
rpcpassword=***********
rpcbind=127.0.0.1
rpcport=14022
rpctimeout=50000


# --- This node's own RPC / API server --------------------------------
# rpcassetport = port THIS app serves its own API on (asset queries).
# rpcthreads   = worker threads for that API.
# rpcallow*    = default response policy. false = respond only to commands you
#   explicitly enable with rpcallow<command>=true; true = respond to all except
#   those you explicitly disable with rpcallow<command>=false.
# rpcdebugshowparamsonerror = log request params on error (DEBUG only).
rpcassetport=14024
rpcthreads=16
rpcallow*=false
rpcdebugshowparamsonerror=false


# --- Chain analyzer (what the node stores about the chain) -----------
# pruneage = blocks of old, no-longer-needed data to keep. -1 = keep everything
#   (needed to run a full explorer / query historic state); 5760 = ~1 day.
# prune{exchange,utxo,vote}history = 1 prune / 0 keep each historic data type.
# storenonassetutxo = 0 is much smaller + faster (can't report total DGB at a
#   height, and pruned spent UTXOs may look asset-free). 1 keeps it all.
# bootstrapchainstate = 1 pulls the latest matching chain.db over IPFS if chain.db
#   is missing (the installer also fast-syncs chain.db from the R2 snapshot).
# verifydatabasewrite controls STEADY-STATE durability only. The genesis->tip
#   sync is ALWAYS fast now (chain.db is re-derivable, so relaxed durability is
#   safe during catch-up, then durable writes are restored at the tip if =1).
#   1 = durable once synced (fsync per commit); 0 = stay fast forever (a crash
#   just means re-syncing).
# showallblocksynctimes = 0 groups 100 blocks per line when far behind.
# pipelinesync = 0 (default). 1 = overlap block fetch with block processing on a
#   background thread during deep bulk sync (>110 behind, asset era). Experimental
#   speedup for from-genesis syncs; see PIPELINE-SYNC-TESTING.md.
pruneage=5760
pruneexchangehistory=1
pruneutxohistory=1
prunevotehistory=1
storenonassetutxo=0
bootstrapchainstate=1
verifydatabasewrite=0
showallblocksynctimes=0
pipelinesync=0


# --- Permanent Storage Pools (PSP) -----------------------------------
# Pools pin (host) DigiAsset content. Your node has FOUR, by index:
#   Pool 0 "local"          - assets you personally pin. LOCAL ONLY, no psp0server.
#   Pool 1 "MCTrivia's PSP"  - legacy pool. DEPRECATED; kept so older configs keep
#                             working. New nodes: leave unsubscribed, use Pool 2.
#   Pool 2 "DigiStamp Pool"  - the community pool (pool.digistamp.co). THE one new
#                             nodes join; replaces Pool 1.
#   Pool 3 "Custom Pool"     - a spare, user-configurable slot. Inert until you set
#                             psp3server + psp3subscribe=1. Point it at any pool.
#
# Keys are psp<N><setting>:
#   psp<N>subscribe     1 = participate. Pools 2 and 3 are OPT-IN (default 0), so
#                       upgrading a node never changes its membership on its own.
#   psp<N>payout        DGB address the pool pays THIS node. If it starts with _
#                       it's a wallet LABEL (needs a loaded wallet - use a real
#                       address to be safe). A subscribed pool needs a payout or the
#                       node errors "Could not generate new PSP payout address".
#   psp<N>autoremovebad 1 = let the pool auto-unpin assets it flags bad.
#   psp<N>server        base URL of the pool (HTTPS). A node ON the pool box may use
#                       http://127.0.0.1:14028. (Not applicable to Pool 0.)
#   psp<N>visible       1 = show this node on the pool's world map.
#   psp<N>secret        per-node identity token. LEAVE UNSET - auto-generated and
#                       saved here. NEVER copy it between nodes (they'd collide).
#   psp<N>permanentpage internal permanent-list page cursor (leave default).
#   psp<N>costpercent   PRICING (for a pool YOU operate): % of the size-based cost
#                       asset issuers pay. 100 = default (cheap). 10000 = 100x.
#   psp<N>mincostcents  PRICING: minimum charge in US cents (0 = none, 100 = $1 floor).
psp0subscribe=1
psp0payout=***********
psp0autoremovebad=1

# Pool 1 (MCTrivia's PSP) - DEPRECATED. Use Pool 2 instead.
psp1subscribe=0

# Pool 2 (DigiStamp Pool) - the pool new nodes join.
psp2subscribe=1
psp2payout=***********
psp2server=https://pool.digistamp.co
psp2visible=1
psp2autoremovebad=1
# psp2secret=            (leave blank; auto-generated per node)
psp2permanentpage=23
# psp2costpercent=100    (pricing - only meaningful for a pool YOU run)
# psp2mincostcents=0

# Pool 3 (Custom Pool) - spare slot, inert until you configure + subscribe it.
psp3subscribe=0
# psp3server=https://your-second-pool.example
# psp3payout=***********


# --- IPFS (content hosting) ------------------------------------------
# ipfspath must start with http and end with /
# ipfstimeoutpin/download in seconds; ipfstimeoutretry = wait before retrying a
#   failed download; ipfsparallel = max concurrent IPFS commands (too high crashes).
ipfspath=http://localhost:5001/api/v0/
ipfstimeoutpin=1200
ipfstimeoutdownload=3600
ipfstimeoutretry=3600
ipfsparallel=10


# --- Web server (optional docs UI) -----------------------------------
# Port for the optional web helper (only runs if you launch the web app).
webport=8090
